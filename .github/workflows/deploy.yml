name: Deploy to Azure VM

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy over SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.AZURE_HOST }}
      username: ${{ secrets.AZURE_USER }}
      key: ${{ secrets.AZURE_SSH_KEY }}
      script: |
        cd ~/theepicbook
        git pull
        docker-compose up -d --build
```

